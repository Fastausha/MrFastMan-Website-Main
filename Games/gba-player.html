<!DOCTYPE html>
<html>
<head>
  <title>GBA Player</title>
  <link rel="stylesheet" href="/emulator/emulator.min.css">
  <script src="/emulator/loader.js"></script>
</head>
<body style="margin:0;background:black;">

<div id="game"></div>

<script>
  const params = new URLSearchParams(location.search);
  const rom = params.get("rom");

  EJS_player = "#game";
  EJS_core = "gba";
  EJS_gameUrl = rom;
  EJS_fullscreenOnLoad = true;
</script>

</body>
</html>
