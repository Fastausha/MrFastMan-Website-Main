<!DOCTYPE html>
<html>
<head>
  <title>GBA Player</title>
  <style>
    body { margin: 0; background: black; }
    iframe { width: 100vw; height: 100vh; border: none; }
  </style>
</head>
<body>

<iframe id="emu"></iframe>

<script>
  const params = new URLSearchParams(location.search);
  const rom = params.get("rom");

  document.getElementById("emu").src =
    "https://cdn.emulatorjs.org/latest/index.html?system=gba&rom=" + rom;
</script>

</body>
</html>
