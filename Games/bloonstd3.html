<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloons TD 3</title>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<link rel="stylesheet" href="../style.css">
<style>
  body { background: #000; color: #fff; text-align: center; margin: 0; font-family: Arial, sans-serif; }
  h1 { margin-top: 20px; color: #ffcc00; }
  #game-container { width: 400px; height: 400px; margin: 20px auto; background: #000; display: flex; align-items: center; justify-content: center; }
  #game-container canvas { width: 100% !important; height: 100% !important; }
  .game-buttons { margin: 20px; }
  button { padding: 12px 25px; margin: 10px; font-size: 1em; border-radius: 8px; cursor: pointer; background: #ffcc00; border: 2px solid #fff; font-weight: bold; color: #111; transition: 0.2s; }
  button:hover { background: #fff; color: #ff3c3c; }
</style>
</head>
<body>
<h1>Bloons TD 3</h1>

<div id="game-container"></div>

<div class="game-buttons">
  <button onclick="goFullScreen()">Full Screen</button>
  <button onclick="window.location.href='/gaming/index.html'">Exit to Portal</button>
</div>

<script>
  window.RufflePlayer = window.RufflePlayer || {};
  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();
  document.getElementById("game-container").appendChild(player);
  player.load("Bloons_Tower_Defense_3.swf");

  // Fullscreen function
function goFullScreen() {
  const player = document.querySelector("ruffle-player");

  if (player.requestFullscreen) player.requestFullscreen();
  else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
  else if (player.msRequestFullscreen) player.msRequestFullscreen();
}

</script>
</body>
</html>
