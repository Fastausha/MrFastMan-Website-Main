<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloons TD 5</title>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<link rel="stylesheet" href="../style.css">

<style>
  body {
    background: #000;
    color: #fff;
    text-align: center;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  h1 {
    margin-top: 20px;
    color: #ffcc00;
  }

  #game-container {
    width: 800px;
    height: 600px;
    margin: 20px auto;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game-container canvas {
    width: 100% !important;
    height: 100% !important;
  }

  /* Fullscreen Fix */
  ruffle-player:fullscreen,
  ruffle-player:fullscreen .ruffle-container,
  ruffle-player:fullscreen canvas {
    width: 100vw !important;
    height: 100vh !important;
  }
</style>
</head>

<body>
<h1>Bloons TD 5</h1>

<div id="game-container"></div>

<div class="game-buttons">
  <button onclick="goFullScreen()">Full Screen</button>
  <button onclick="window.location.href='../gaming.html'">Exit to Portal</button>
</div>

<script>
  // Load Ruffle
  window.RufflePlayer = window.RufflePlayer || {};
  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();
  document.getElementById("game-container").appendChild(player);

  // Load the SWF (make sure the file name matches)
  player.load("bloonstd5.swf");

  // Fullscreen function
  function goFullScreen() {
  const canvas = document.querySelector("canvas");
  if (canvas.requestFullscreen) canvas.requestFullscreen();
}

</script>

</body>
</html>
